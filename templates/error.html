{% extends "base.html" %}
{% block title %}Error {{ code }} - {{ app_name }}{% endblock %}
{% block page_name %}error{% endblock %}

{% block content %}
<section class="error-page">
    <div class="container">
        <div class="error-box">
            <div class="error-code">{{ code }}</div>
            <h1>Error</h1>
            <p class="error-message">{{ message }}</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">Return Home</a>
        </div>
    </div>
</section>
{% endblock %}
